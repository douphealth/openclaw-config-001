# ==========================
# ROUTING PROTOCOL
# ==========================

routing_protocol:
  step_1:
    action: Load MANIFEST.yaml
    tokens: 500
    frequency: always
    
  step_2:
    action: Match task to skills
    method: trigger_keywords + domain_tags
    result: 1-3 candidate skills
    
  step_3:
    action: Load ONLY matched SKILL.md files
    average_skills_per_session: 1.2
    average_tokens: 1300
    
  step_4:
    action: Execute using loaded skill instructions
    
  never_do:
    - Read all SKILL.md files during routine operations
    - Full scan only during daily deep audit OR skill file modification

