policies:
  secrets_in_git: false
  release_checksums: true
  backup_encryption_required: true
  approved_skills_only: true
  archive_before_delete: true

requirements:
  every_skill_must_have:
    - SKILL.md with frontmatter
    - "## Do NOT Use This For" boundary section
    - "## Output Contract" section
  recommended:
    - scripts/ directory for repeatable work
    - references/ directory for detailed patterns
    - Cross-references (→) to related skills

routing:
  active_path: skills-approved/
  archive_path: skills-archive/
  legacy_path: skills/

ci:
  workflow: .github/workflows/validate.yml
  runs_on: ubuntu-latest
  triggers: [push, pull_request]

notes:
  - Version 3: Enterprise-grade upgrade from v2
  - All 36 skills have Do NOT Use boundaries and Output Contracts
  - 23 skills have cross-references to related skills
  - 7 skills have scripts/ directories with extracted Python
  - 26 skills have references/ directories with detailed patterns
  - 5 workflow macros for common multi-skill pipelines
  - Auto-verification layer catches false "done" claims
  - Quality scorecard for tracking skill performance
  - Run make validate before every release
