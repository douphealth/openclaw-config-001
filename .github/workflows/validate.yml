name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install validation dependency
        run: python -m pip install --quiet pyyaml

      - name: Run repository validation
        run: bash scripts/validate.sh

      - name: Audit SEO superpowers coverage
        shell: pwsh
        run: |
          $json = ./scripts/audit-seo-superpowers.ps1 | Out-String | ConvertFrom-Json
          if ($json.withSotaLayer -lt 10) { throw "SEO superpowers audit below expected coverage" }
          Write-Host "SEO superpowers coverage OK: $($json.withSotaLayer)/$($json.checked)"

      - name: Validate complete
        run: echo "repo structure validated OK"
