name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          for f in README.md RECOVERY.md OPERATIONS.md SECURITY.md MANIFEST.yaml Makefile; do
            test -f "$f" || { echo "MISSING: $f"; exit 1; }
          done
          echo "All required files present"

      - name: Check required dirs
        run: |
          for d in scripts docs skills-approved skills-archive; do
            test -d "$d" || { echo "MISSING DIR: $d"; exit 1; }
          done
          echo "All required dirs present"

      - name: Check no secrets leaked
        run: |
          if grep -RInE '(OPENAI_API_KEY=sk-|BEGIN PRIVATE KEY|xoxb-[A-Za-z0-9])' . --exclude-dir=.git --exclude=.env.example; then
            echo "SECRET DETECTED - failing"
            exit 1
          fi
          echo "No secrets detected"

      - name: Check approved skills exist
        run: |
          for s in openai-codex-orchestrator blog-master wordpress seo-research-master technical-seo-checker keyword-intelligence-os wp-reliability-ops git-sync grounding-compliance-os automation-ops; do
            test -d "skills-approved/$s" || { echo "MISSING: $s"; exit 1; }
          done
          echo "All approved skills present"

      - name: Audit SEO superpowers coverage
        shell: pwsh
        run: |
          $json = ./scripts/audit-seo-superpowers.ps1 | Out-String | ConvertFrom-Json
          if ($json.withSotaLayer -lt 10) { throw "SEO superpowers audit below expected coverage" }
          Write-Host "SEO superpowers coverage OK: $($json.withSotaLayer)/$($json.checked)"

      - name: Validate complete
        run: echo "repo structure validated OK"
