<!-- Premium Amazon affiliate product box template -->
<div style="position:relative;border:1px solid #eadfce;border-radius:24px;padding:24px;background:linear-gradient(135deg,#fffefb 0%,#fff8ef 48%,#ffffff 100%);box-shadow:0 18px 40px rgba(24,30,52,.08);margin:32px 0;overflow:hidden;">
  <div style="position:absolute;top:0;right:0;width:140px;height:140px;background:radial-gradient(circle at top right,rgba(245,158,11,.16),rgba(245,158,11,0));pointer-events:none;"></div>
  <div style="display:flex;flex-wrap:wrap;gap:24px;align-items:center;position:relative;z-index:1;">
    <div style="flex:0 0 210px;max-width:210px;margin:0 auto;">
      <a href="{{AMAZON_URL}}" target="_blank" rel="nofollow sponsored noopener" aria-label="{{ARIA_LABEL}}" style="display:block;text-decoration:none;">
        <div style="background:#ffffff;border:1px solid #f1e5d2;border-radius:18px;padding:14px;box-shadow:0 10px 24px rgba(17,24,39,.06);">
          <img src="{{IMAGE_URL}}" alt="{{IMAGE_ALT}}" style="width:100%;height:auto;display:block;border-radius:12px;object-fit:contain;" />
        </div>
      </a>
    </div>
    <div style="flex:1 1 360px;min-width:280px;">
      <div style="display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:#8b6b3f;font-weight:800;margin-bottom:10px;padding:7px 11px;border-radius:999px;background:#fff4df;border:1px solid #f3dfb8;">{{EYEBROW}}</div>
      <h3 style="margin:0 0 12px;font-size:28px;line-height:1.18;color:#18212f;">{{PRODUCT_NAME}}</h3>
      <p style="margin:0 0 16px;font-size:15px;line-height:1.8;color:#475467;">{{FIT_NOTE}}</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px 14px;margin:0 0 18px;">
        <div style="background:rgba(255,255,255,.78);border:1px solid #efe4d4;border-radius:14px;padding:10px 12px;font-size:14px;line-height:1.6;color:#344054;">✓ {{BULLET_1}}</div>
        <div style="background:rgba(255,255,255,.78);border:1px solid #efe4d4;border-radius:14px;padding:10px 12px;font-size:14px;line-height:1.6;color:#344054;">✓ {{BULLET_2}}</div>
        <div style="background:rgba(255,255,255,.78);border:1px solid #efe4d4;border-radius:14px;padding:10px 12px;font-size:14px;line-height:1.6;color:#344054;">✓ {{BULLET_3}}</div>
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center;">
        <a href="{{AMAZON_URL}}" target="_blank" rel="nofollow sponsored noopener" style="display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#f59e0b 0%,#fbbf24 100%);color:#111827;text-decoration:none;font-weight:800;padding:14px 22px;border-radius:999px;box-shadow:0 12px 24px rgba(245,158,11,.28);font-size:15px;">Buy on Amazon</a>
        <div style="font-size:12px;line-height:1.65;color:#667085;max-width:360px;">{{TRUST_MICROCOPY}}</div>
      </div>
      <p style="margin:14px 0 0;font-size:12px;line-height:1.7;color:#667085;">{{DISCLOSURE}}</p>
    </div>
  </div>
</div>
